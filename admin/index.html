<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — joan_off</title>
  <link rel="stylesheet" href="admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="logo-mark">joan_off<span class="dot">.</span></div>
      <p class="login-label">Panel Administrateur</p>
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-icon">
          <input type="password" id="loginPass" placeholder="••••••••"/>
          <i class="fa-solid fa-lock"></i>
        </div>
      </div>
      <button class="btn-primary" onclick="doLogin()">Entrer <i class="fa-solid fa-arrow-right"></i></button>
      <p class="login-err" id="loginErr"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard" style="display:none">

    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo-mark sm">joan_off<span class="dot">.</span></div>
        <div class="sidebar-admin-tag">Admin</div>
      </div>
      <nav>
        <button class="nav-btn active" data-tab="projects" onclick="switchTab('projects',this)">
          <i class="fa-solid fa-code-branch"></i> Projets
        </button>
        <button class="nav-btn" data-tab="messages" onclick="switchTab('messages',this)">
          <i class="fa-solid fa-inbox"></i> Messages
          <span class="msg-count" id="msgCount" style="display:none">0</span>
        </button>
        <button class="nav-btn" data-tab="settings" onclick="switchTab('settings',this)">
          <i class="fa-solid fa-sliders"></i> Paramètres
        </button>
      </nav>
      <div class="sidebar-bottom">
        <a href="../index.html" class="sidebar-link"><i class="fa-solid fa-eye"></i> Voir portfolio</a>
        <button class="sidebar-link danger" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
      </div>
    </aside>

    <main class="main">

      <!-- PROJECTS -->
      <div class="panel active" id="panel-projects">
        <div class="panel-head">
          <div><h1>Projets</h1><p>Gérer les projets du portfolio</p></div>
          <button class="btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Nouveau</button>
        </div>
        <div id="projList"></div>
        <p class="empty" id="emptyProj" style="display:none">Aucun projet. Créez-en un !</p>
      </div>

      <!-- MESSAGES -->
      <div class="panel" id="panel-messages">
        <div class="panel-head">
          <div><h1>Messages</h1><p>Formulaire de contact</p></div>
          <button class="btn-outline" onclick="clearMsgs()">Tout effacer</button>
        </div>
        <div id="msgList"></div>
        <p class="empty" id="emptyMsg" style="display:none">Aucun message reçu.</p>
      </div>

      <!-- SETTINGS -->
      <div class="panel" id="panel-settings">
        <div class="panel-head">
          <div><h1>Paramètres</h1><p>Gestion du compte admin</p></div>
        </div>
        <div class="settings-card">
          <div class="form-group">
            <label>Nouveau mot de passe admin</label>
            <input type="password" id="newPass" placeholder="Laisser vide pour ne pas changer"/>
          </div>
          <button class="btn-primary" onclick="saveSettings()">Sauvegarder</button>
          <p class="feedback" id="settFeedback"></p>
        </div>
      </div>

    </main>
  </div>

  <!-- MODAL -->
  <div class="overlay" id="overlay" onclick="closeOverlay(event)">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalLabel">Nouveau projet</h2>
        <button onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <input type="hidden" id="editId"/>

      <!-- Logo upload -->
      <div class="logo-upload-area" id="logoUploadArea" onclick="document.getElementById('logoFile').click()">
        <div class="logo-preview" id="logoPreview">
          <i class="fa-solid fa-image"></i>
          <span>Cliquer pour ajouter un logo</span>
        </div>
        <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="previewLogo(this)"/>
      </div>

      <div class="form-row2">
        <div class="form-group">
          <label>Titre *</label>
          <input type="text" id="pTitle" placeholder="Nom du projet"/>
        </div>
        <div class="form-group">
          <label>Tag</label>
          <input type="text" id="pTag" placeholder="Web, App, Tool..."/>
        </div>
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea id="pDesc" rows="3" placeholder="Description courte..."></textarea>
      </div>
      <div class="form-group">
        <label>Technologies <small>(séparées par virgule)</small></label>
        <input type="text" id="pTechs" placeholder="HTML, CSS, JS"/>
      </div>
      <div class="form-row2">
        <div class="form-group">
          <label>GitHub URL</label>
          <input type="url" id="pGithub" placeholder="https://github.com/..."/>
        </div>
        <div class="form-group">
          <label>Demo URL</label>
          <input type="url" id="pDemo" placeholder="https://..."/>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="saveProject()" id="saveBtn">Sauvegarder</button>
      </div>
      <p class="feedback" id="modalFeedback"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://gloejzyzgomrmmyonzll.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsb2Vqenl6Z29tcm1teW9uemxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3Njc5NTYsImV4cCI6MjA5MzM0Mzk1Nn0.x39I6vpL_1jU3yt0QakEZZROhHVnCFzB3c0-UM3MpT0';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    const DEFAULT_PASS = 'admin123';
    let logoDataUrl = null;
    let logoFile = null;
    let currentLogoUrl = null;

    // LOGIN
    function doLogin() {
      const v = document.getElementById('loginPass').value;
      const stored = localStorage.getItem('joan_pass') || DEFAULT_PASS;
      if (v === stored) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        loadProjects();
        loadMessages();
      } else {
        document.getElementById('loginErr').textContent = '⚠ Mot de passe incorrect';
      }
    }
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
    function doLogout() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginPass').value = '';
    }

    // TABS
    function switchTab(name, btn) {
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('panel-'+name).classList.add('active');
      btn.classList.add('active');
    }

    // PROJECTS
    async function loadProjects() {
      const list = document.getElementById('projList');
      const empty = document.getElementById('emptyProj');
      list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      const { data } = await sb.from('projects').select('*').order('created_at',{ascending:false});
      list.innerHTML = '';
      if (!data || data.length===0) { empty.style.display='block'; return; }
      empty.style.display='none';
      data.forEach(p => {
        const el = document.createElement('div');
        el.className = 'proj-item';
        el.innerHTML = `
          <div class="proj-logo">
            ${p.logo_url ? `<img src="${p.logo_url}" alt="${p.title}"/>` : `<div class="no-logo"><i class="fa-solid fa-code"></i></div>`}
          </div>
          <div class="proj-info">
            <div class="proj-top-row">
              <span class="proj-tag">${p.tag||'Web'}</span>
              <span class="proj-date">${new Date(p.created_at).toLocaleDateString('fr-FR')}</span>
            </div>
            <h3>${p.title}</h3>
            <p>${p.description||''}</p>
            <div class="proj-techs">${(p.techs||'').split(',').filter(t=>t.trim()).map(t=>`<span>${t.trim()}</span>`).join('')}</div>
          </div>
          <div class="proj-actions">
            <button class="icon-btn" onclick="editProject('${p.id}')"><i class="fa-solid fa-pen"></i></button>
            <button class="icon-btn red" onclick="deleteProject('${p.id}','${p.logo_url||''}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        `;
        list.appendChild(el);
      });
    }

    // MODAL
    function openModal(id) {
      logoDataUrl = null; logoFile = null; currentLogoUrl = null;
      document.getElementById('editId').value = id || '';
      document.getElementById('modalLabel').textContent = id ? 'Modifier le projet' : 'Nouveau projet';
      resetLogoPreview();
      if (!id) {
        ['pTitle','pDesc','pTag','pTechs','pGithub','pDemo'].forEach(i=>document.getElementById(i).value='');
      }
      document.getElementById('overlay').classList.add('open');
    }
    async function editProject(id) {
      const { data } = await sb.from('projects').select('*').eq('id',id).single();
      if (!data) return;
      openModal(id);
      document.getElementById('pTitle').value = data.title||'';
      document.getElementById('pDesc').value = data.description||'';
      document.getElementById('pTag').value = data.tag||'';
      document.getElementById('pTechs').value = data.techs||'';
      document.getElementById('pGithub').value = data.github_url||'';
      document.getElementById('pDemo').value = data.demo_url||'';
      currentLogoUrl = data.logo_url||null;
      if (data.logo_url) {
        document.getElementById('logoPreview').innerHTML = `<img src="${data.logo_url}" alt="logo"/><span>Cliquer pour changer</span>`;
      }
    }
    function closeModal() { document.getElementById('overlay').classList.remove('open'); }
    function closeOverlay(e) { if (e.target===document.getElementById('overlay')) closeModal(); }

    // LOGO PREVIEW
    function previewLogo(input) {
      if (!input.files[0]) return;
      logoFile = input.files[0];
      const reader = new FileReader();
      reader.onload = e => {
        logoDataUrl = e.target.result;
        document.getElementById('logoPreview').innerHTML = `<img src="${logoDataUrl}" alt="logo"/><span>Cliquer pour changer</span>`;
      };
      reader.readAsDataURL(logoFile);
    }
    function resetLogoPreview() {
      document.getElementById('logoPreview').innerHTML = `<i class="fa-solid fa-image"></i><span>Cliquer pour ajouter un logo</span>`;
      document.getElementById('logoFile').value = '';
    }

    // UPLOAD LOGO
    async function uploadLogo() {
      if (!logoFile) return currentLogoUrl;
      const ext = logoFile.name.split('.').pop();
      const path = `logos/${Date.now()}.${ext}`;
      const { error } = await sb.storage.from('project-logos').upload(path, logoFile, { upsert:true });
      if (error) { console.error(error); return currentLogoUrl; }
      const { data } = sb.storage.from('project-logos').getPublicUrl(path);
      return data.publicUrl;
    }

    // SAVE PROJECT
    async function saveProject() {
      const title = document.getElementById('pTitle').value.trim();
      const desc = document.getElementById('pDesc').value.trim();
      if (!title||!desc) { document.getElementById('modalFeedback').textContent='Titre et description requis.'; return; }
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Envoi...';
      const logoUrl = await uploadLogo();
      const payload = {
        title, description:desc,
        tag: document.getElementById('pTag').value.trim()||'Web',
        techs: document.getElementById('pTechs').value.trim(),
        github_url: document.getElementById('pGithub').value.trim(),
        demo_url: document.getElementById('pDemo').value.trim(),
        logo_url: logoUrl||null,
        updated_at: new Date().toISOString(),
      };
      const editId = document.getElementById('editId').value;
      let error;
      if (editId) {
        ({error} = await sb.from('projects').update(payload).eq('id',editId));
      } else {
        ({error} = await sb.from('projects').insert(payload));
      }
      btn.disabled=false; btn.textContent='Sauvegarder';
      if (error) { document.getElementById('modalFeedback').textContent='Erreur: '+error.message; return; }
      closeModal();
      loadProjects();
    }

    async function deleteProject(id, logoUrl) {
      if (!confirm('Supprimer ce projet ?')) return;
      if (logoUrl) {
        const path = logoUrl.split('/project-logos/')[1];
        if (path) await sb.storage.from('project-logos').remove([path]);
      }
      await sb.from('projects').delete().eq('id',id);
      loadProjects();
    }

    // MESSAGES
    async function loadMessages() {
      const list = document.getElementById('msgList');
      const empty = document.getElementById('emptyMsg');
      list.innerHTML = '';
      const { data } = await sb.from('messages').select('*').order('created_at',{ascending:false});
      if (!data||data.length===0) { empty.style.display='block'; return; }
      empty.style.display='none';
      const badge = document.getElementById('msgCount');
      badge.textContent = data.length;
      badge.style.display = data.length>0?'inline-flex':'none';
      data.forEach(m => {
        const el = document.createElement('div');
        el.className = 'msg-item';
        el.innerHTML = `
          <div class="msg-meta">
            <strong>${m.name}</strong>
            <span class="msg-email">${m.email}</span>
            <span class="msg-date">${new Date(m.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
          </div>
          <p class="msg-body">${m.message}</p>
          <button class="icon-btn red small" onclick="deleteMsg('${m.id}')"><i class="fa-solid fa-trash"></i></button>
        `;
        list.appendChild(el);
      });
    }
    async function deleteMsg(id) {
      await sb.from('messages').delete().eq('id',id);
      loadMessages();
    }
    async function clearMsgs() {
      if (!confirm('Effacer tous les messages ?')) return;
      await sb.from('messages').delete().neq('id','00000000-0000-0000-0000-000000000000');
      loadMessages();
    }

    // SETTINGS
    function saveSettings() {
      const p = document.getElementById('newPass').value;
      if (p) localStorage.setItem('joan_pass', p);
      const fb = document.getElementById('settFeedback');
      fb.textContent = '✓ Sauvegardé !';
      fb.className = 'feedback ok';
      setTimeout(() => fb.textContent='', 3000);
    }
  </script>
</body>
</html>
